<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparingi BJJ - Znajdź partnera na matę</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .app-header { background-color: #212529; color: white; padding: 15px 0; text-align: center; }
        .event-card { margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="app-header">
        <h3 class="m-0">🥋 Sparingi BJJ</h3>
    </div>

    <div class="container mt-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="m-0">Nadchodzące wydarzenia</h5>
            <button class="btn btn-primary btn-sm">+ Dodaj slot</button>
        </div>

        <div class="card event-card">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="card-title text-danger">Open Mat - Bestwinka</h5>
                    <span class="badge bg-dark">No-Gi</span>
                </div>
                <p class="card-text mb-1"><strong>📅 Kiedy:</strong> 15.05.2026, 17:30</p>
                <p class="card-text mb-1"><strong>👥 Limit:</strong> 2 / 4 osoby</p>
                <p class="card-text text-muted small">Mocne zadaniówki, kategoria wagowa ok. 85 kg. Minimalny poziom: niebieski pas.</p>
                <div class="d-grid mt-3">
                    <button class="btn btn-outline-success">Dołącz do sparingu</button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
